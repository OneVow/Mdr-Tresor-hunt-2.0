<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { font-size: 1.8em; margin-bottom: 30px; }

.input-box {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

input {
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  width: 60%;
  max-width: 250px;
}

button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover { transform: scale(1.05); }

#hint { margin-top:10px; font-size:14px; color:#cbd5f5; }

.card {
  background: #1e293b;
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  display: none;
  animation: fadeIn 0.5s ease;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.success { color: #22c55e; margin-top: 15px; }
.error { color: #ef4444; margin-top: 15px; }

.lang-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.lang-buttons button {
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;
}

#btn-en { background:#3b82f6; }
#btn-hr { background:#f97316; }
#btn-me { background:#10b981; }
#btn-es { background:#ef4444; }
#btn-de { background:#8b5cf6; }
#btn-nl { background:#f59e0b; }
#btn-fr { background:#6366f1; }

#hintBtn { background:#fbbf24; }

</style>
</head>

<body>

<h1>🧭 Treasure Hunt</h1>

<div class="input-box">
  <input type="text" id="codeInput">
  <button id="submitBtn">Submit</button>
  <button onclick="showHint()">Hint</button>
</div>

<p id="hint"></p>
<div id="message"></div>

<div id="step1" class="card">
  <h2 id="step1Title"></h2>
  <p id="step1Coords"></p>
  <div id="mapContainer1">
    <img id="mapImage1" src="images/step1-map.jpg">
  </div>
</div>

<div id="step2" class="card">
  <h2 id="step2Title"></h2>
  <p id="step2Coords"></p>
  <div id="mapContainer2">
    <img id="mapImage2" src="images/step2-map.jpg">
  </div>
</div>

<div id="step3" class="card">
  <h2 id="step3Title"></h2>
  <div id="step3Congrats"></div>
  <img id="step3Img" src="images/step3-map.jpg">
</div>

<div class="lang-buttons">
  <button id="btn-en">EN</button>
  <button id="btn-hr">HR</button>
  <button id="btn-me">ME</button>
  <button id="btn-es">ES</button>
  <button id="btn-de">DE</button>
  <button id="btn-nl">NL</button>
  <button id="btn-fr">FR</button>
</div>

<script>
const data = {
  en:{
    hint:"Enter the code with only the first letter capitalized.",
    hints:["🍈 Green fruit","🦈 Shark part","🌊 Coral ecosystem"],
    wrong:"Wrong code",
    step1:"Step 1 unlocked!",
    step2:"Step 2 unlocked!",
    step3:"Finished!"
  },
  fr:{
    hint:"Entrez le code avec une majuscule.",
    hints:["🍈 Fruit vert","🦈 Partie du requin","🌊 Écosystème marin"],
    wrong:"Mauvais code",
    step1:"Étape 1 débloquée!",
    step2:"Étape 2 débloquée!",
    step3:"Fini!"
  }
};

let lang="en";
let currentStep=0;

// language buttons
document.querySelectorAll(".lang-buttons button").forEach(btn=>{
  btn.onclick=()=>{lang=btn.id.split("-")[1]; updateLang();}
});

function updateLang(){
  document.getElementById("hint").innerText=data[lang].hint;
}

updateLang();

// hint system
function showHint(){
  if(currentStep===0){ alert(data[lang].hints[0]); }
  else if(currentStep===1){ alert(data[lang].hints[1]); }
  else if(currentStep>=2){ alert(data[lang].hints[2]); }
}

// submit
document.getElementById("submitBtn").onclick=()=>{
  let code=document.getElementById("codeInput").value.trim();
  let msg=document.getElementById("message");

  if(code==="Melon"){
    document.getElementById("step1").style.display="block";
    msg.innerHTML="<div class='success'>"+data[lang].step1+"</div>";
    currentStep=1;
  }
  else if(code==="Dorsal fin"){
    document.getElementById("step2").style.display="block";
    msg.innerHTML="<div class='success'>"+data[lang].step2+"</div>";
    currentStep=2;
  }
  else if(code==="Reef"){
    document.getElementById("step3").style.display="block";
    document.getElementById("step3Congrats").innerText=data[lang].step3;
    currentStep=3;
  }
  else{
    msg.innerHTML="<div class='error'>"+data[lang].wrong+"</div>";
  }
};
</script>

</body>
</html>
