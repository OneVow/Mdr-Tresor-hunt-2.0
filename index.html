<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 20px;
  }

  h1 { font-size: 1.8em; margin-bottom: 30px; }

  .input-box { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  input { padding: 14px; font-size: 16px; border-radius: 12px; border: none; width: 60%; max-width: 250px; }
  button { padding: 14px 20px; font-size: 16px; border-radius: 12px; border: none; cursor: pointer; transition: transform 0.2s; }
  button:hover { transform: scale(1.05); }

  .card {
    background: #1e293b;
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    display: none;
    animation: fadeIn 0.5s ease;
  }

  img { width: 100%; border-radius: 10px; margin-top: 10px; }
  .success { color: #22c55e; margin-top: 15px; animation: pop 0.3s ease; }
  .error { color: #ef4444; margin-top: 15px; animation: shake 0.3s ease; }

  @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
  @keyframes pop { 0%{transform:scale(0.8);} 100%{transform:scale(1);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 50%{transform:translateX(5px);} 75%{transform:translateX(-5px);} }

  .lang-buttons { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
  .lang-buttons button { font-size: 14px; padding: 10px 16px; border-radius: 8px; }

  /* Styles individuels pour chaque langue */
  #btn-en { background-color: #3b82f6; color: white; }
  #btn-hr { background-color: #f97316; color: white; }
  #btn-me { background-color: #10b981; color: white; }

  #btn-en:hover { background-color: #2563eb; }
  #btn-hr:hover { background-color: #ea580c; }
  #btn-me:hover { background-color: #059669; }
</style>
</head>
<body>

<h1 id="title">🧭 Treasure Hunt</h1>

<div class="input-box">
  <input type="text" id="codeInput" placeholder="Enter your code">
  <button id="submitBtn" onclick="checkCode()">Submit</button>
</div>

<p id="hint" style="margin-top:10px; font-size:14px; color:#cbd5f5;">Enter the code with only the first letter capitalized.</p>
<div id="message"></div>

<div id="step1" class="card">
  <h2 id="step1Title">📍 Step 1</h2>
  <p id="step1Coords">48.8584, 2.2945</p>
  <img id="step1Img" src="https://via.placeholder.com/400x200">
</div>

<div id="step2" class="card">
  <h2 id="step2Title">📍 Step 2</h2>
  <p id="step2Coords">43.2965, 5.3698</p>
  <img id="step2Img" src="https://via.placeholder.com/400x200">
</div>

<div id="step3" class="card">
  <h2 id="step3Title">🏁 Final Step</h2>
  <p id="step3Coords">45.7640, 4.8357</p>
  <img id="step3Img" src="https://via.placeholder.com/400x200">
</div>

<div class="lang-buttons">
  <button id="btn-en" onclick="setLanguage('en')">English</button>
  <button id="btn-hr" onclick="setLanguage('hr')">Croatian</button>
  <button id="btn-me" onclick="setLanguage('me')">Montenegro</button>
</div>

<script>
const data = {
  en: {
    title: "🧭 Treasure Hunt",
    hint: "Enter the code with only the first letter capitalized.",
    submit: "Submit",
    messages: {
      wrong: "❌ Wrong code, try again.",
      step1: "Step 1 unlocked!",
      step2: "Step 2 unlocked!",
      step3: "🏆 Congratulations! You finished the game!"
    },
    steps: {
      step1: { title: "📍 Step 1", coords: "48.8584, 2.2945", img: "https://via.placeholder.com/400x200" },
      step2: { title: "📍 Step 2", coords: "43.2965, 5.3698", img: "https://via.placeholder.com/400x200" },
      step3: { title: "🏁 Final Step", coords: "45.7640, 4.8357", img: "https://via.placeholder.com/400x200" }
    }
  },
  hr: {
    title: "🧭 Lov na blago",
    hint: "Unesite kod s samo prvim velikim slovom.",
    submit: "Pošalji",
    messages: {
      wrong: "❌ Pogrešan kod, pokušajte ponovno.",
      step1: "Korak 1 otključan!",
      step2: "Korak 2 otključan!",
      step3: "🏆 Čestitamo! Završili ste igru!"
    },
    steps: {
      step1: { title: "📍 Korak 1", coords: "48.8584, 2.2945", img: "https://via.placeholder.com/400x200" },
      step2: { title: "📍 Korak 2", coords: "43.2965, 5.3698", img: "https://via.placeholder.com/400x200" },
      step3: { title: "🏁 Završni korak", coords: "45.7640, 4.8357", img: "https://via.placeholder.com/400x200" }
    }
  },
  me: {
    title: "🧭 Lov na blago",
    hint: "Unesite kod samo s prvim velikim slovom.",
    submit: "Pošalji",
    messages: {
      wrong: "❌ Pogrešan kod, pokušajte opet.",
      step1: "Korak 1 otključan!",
      step2: "Korak 2 otključan!",
      step3: "🏆 Čestitamo! Završili ste igru!"
    },
    steps: {
      step1: { title: "📍 Korak 1", coords: "48.8584, 2.2945", img: "https://via.placeholder.com/400x200" },
      step2: { title: "📍 Korak 2", coords: "43.2965, 5.3698", img: "https://via.placeholder.com/400x200" },
      step3: { title: "🏁 Završni korak", coords: "45.7640, 4.8357", img: "https://via.placeholder.com/400x200" }
    }
  }
};

let currentLang = 'en';

function setLanguage(lang) {
  currentLang = lang;
  document.getElementById('title').innerText = data[lang].title;
  document.getElementById('hint').innerText = data[lang].hint;
  document.getElementById('submitBtn').innerText = data[lang].submit;

  ['step1','step2','step3'].forEach(step => {
    const elem = document.getElementById(step);
    if(elem.style.display === 'block') {
      document.getElementById(step+'Title').innerText = data[lang].steps[step].title;
      document.getElementById(step+'Coords').innerText = data[lang].steps[step].coords;
      document.getElementById(step+'Img').src = data[lang].steps[step].img;
    }
  });
}

function checkCode() {
  const code = document.getElementById("codeInput").value.trim();
  const msg = document.getElementById("message");

  if (code === "Melon") {
    document.getElementById("step1").style.display = "block";
    msg.innerHTML = "<div class='success'>" + data[currentLang].messages.step1 + "</div>";
    setLanguage(currentLang);
  } else if (code === "Ocean2") {
    document.getElementById("step2").style.display = "block";
    msg.innerHTML = "<div class='success'>" + data[currentLang].messages.step2 + "</div>";
    setLanguage(currentLang);
  } else if (code === "Ocean3") {
    document.getElementById("step3").style.display = "block";
    msg.innerHTML = "<div class='success'>" + data[currentLang].messages.step3 + "</div>";
    setLanguage(currentLang);
  } else {
    msg.innerHTML = "<div class='error'>" + data[currentLang].messages.wrong + "</div>";
  }
}
</script>

</body>
</html>
