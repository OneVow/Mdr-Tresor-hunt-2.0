<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background: radial-gradient(circle at 20% 30%, #1e3a8a, transparent 40%),
              radial-gradient(circle at 80% 70%, #0ea5e9, transparent 40%),
              linear-gradient(180deg, #020617, #0f172a, #1e293b);

  color: white;
  text-align: center;
  padding: 20px;
  overflow-x: hidden;
}

/* 🌊 Animation de fond */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 200%;
  height: 200%;

  background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, transparent 60%);
  animation: moveBg 20s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-25%, -25%); }
}

h1 { font-size: 1.8em; margin-bottom: 30px; }

.input-box { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

input {
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  width: 60%;
  max-width: 250px;
}

/* 🎯 Boutons améliorés */
button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;

  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#hint { margin-top:10px; font-size:14px; color:#cbd5f5; }

/* ✨ Cards améliorées */
.card {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(10px);

  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;

  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  display: none;
  animation: fadeIn 0.5s ease;
}

img { width: 100%; border-radius: 10px; margin-top: 10px; }

.success { color: #22c55e; margin-top: 15px; animation: pop 0.3s ease; }
.error { color: #ef4444; margin-top: 15px; animation: shake 0.3s ease; }

@keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
@keyframes pop { 0%{transform:scale(0.8);} 100%{transform:scale(1);} }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 50%{transform:translateX(5px);} 75%{transform:translateX(-5px);} }

/* 🌍 Lang buttons (on garde leurs couleurs) */
.lang-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.lang-buttons button {
  font-size: 12px; 
  padding: 8px 12px; 
  border-radius: 8px;
  flex: 1 1 auto;
  max-width: 120px;
  min-width: 60px;
  white-space: nowrap;
}

/* couleurs spécifiques conservées */
#btn-en { background-color: #3b82f6; }
#btn-hr { background-color: #f97316; }
#btn-me { background-color: #10b981; }
#btn-es { background-color: #ef4444; }
#btn-de { background-color: #8b5cf6; }
#btn-nl { background-color: #f59e0b; }
#btn-fr { background-color: #6366f1; }

#btn-en:hover { background-color: #2563eb; }
#btn-hr:hover { background-color: #ea580c; }
#btn-me:hover { background-color: #059669; }
#btn-es:hover { background-color: #dc2626; }
#btn-de:hover { background-color: #7c3aed; }
#btn-nl:hover { background-color: #ff9a00; }
#btn-fr:hover { background-color: #4f46e5; }

/* bouton hint spécifique */
#hintBtn {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
}

#mapContainer1, #mapContainer2 {
  width: 100%;
  max-width: 400px;
  height: 200px;
  overflow: hidden;
  border-radius: 10px;
  margin: auto;
  touch-action: none;
}
</style>
