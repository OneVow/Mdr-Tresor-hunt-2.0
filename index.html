<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt</title>

<link rel="icon" type="image/png" href="images/favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { font-size: 1.8em; margin-bottom: 30px; }

.input-box { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
input { padding: 14px; font-size: 16px; border-radius: 12px; border: none; width: 60%; max-width: 250px; }
button { padding: 14px 20px; font-size: 16px; border-radius: 12px; border: none; cursor: pointer; transition: transform 0.2s; }
button:hover { transform: scale(1.05); }

#hint { margin-top:10px; font-size:14px; color:#cbd5f5; }

.card {
  background: #1e293b;
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  display: none;
  animation: fadeIn 0.5s ease;
}

img { width: 100%; border-radius: 10px; margin-top: 10px; }

#bottomLogo {
  display: block;
  margin: 30px auto;
  width: 120px;
  opacity: 0.9;
}

.success { color: #22c55e; margin-top: 15px; animation: pop 0.3s ease; }
.error { color: #ef4444; margin-top: 15px; animation: shake 0.3s ease; }

@keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
@keyframes pop { 0%{transform:scale(0.8);} 100%{transform:scale(1);} }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 50%{transform:translateX(5px);} 75%{transform:translateX(-5px);} }

.lang-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.lang-buttons button {
  font-size: 12px; 
  padding: 8px 12px; 
  border-radius: 8px;
  flex: 1 1 auto;
  max-width: 120px;
  min-width: 60px;
  white-space: nowrap;
}

#btn-en { background-color: #3b82f6; color: white; }
#btn-hr { background-color: #f97316; color: white; }
#btn-me { background-color: #10b981; color: white; }
#btn-es { background-color: #ef4444; color: white; }
#btn-de { background-color: #8b5cf6; color: white; }
#btn-nl { background-color: #f59e0b; color: white; }
#btn-fr { background-color: #6366f1; color: white; }

#hintBtn {
  background-color: #fbbf24;
}

#mapContainer1, #mapContainer2 {
  width: 100%;
  max-width: 400px;
  height: 200px;
  overflow: hidden;
  border-radius: 10px;
  margin: auto;
  touch-action: none;
}
</style>
</head>

<body>

<h1>🧭 Treasure Hunt</h1>

<div class="input-box">
  <input type="text" id="codeInput" placeholder="Enter your code">
  <button id="submitBtn">Submit</button>
  <button id="hintBtn">Hint</button>
</div>

<p id="hint">Enter the code with only the first letter capitalized. The answers are in english.</p>
<div id="message"></div>

<!-- Steps -->
<div id="step1" class="card">
  <h2>📍 Step 1</h2>
  <p>48.8584, 2.2945</p>
  <div id="mapContainer1">
    <img id="mapImage1" src="images/step1-map.jpg">
  </div>
</div>

<div id="step2" class="card">
  <h2>📍 Step 2</h2>
  <p>43.2965, 5.3698</p>
  <div id="mapContainer2">
    <img id="mapImage2" src="images/step2-map.jpg">
  </div>
</div>

<div id="step3" class="card">
  <h2>🏁 Final Step</h2>
  <div id="step3Congrats"></div>
  <img id="step3Img" src="images/step3-map.jpg">
</div>

<!-- Language buttons -->
<div class="lang-buttons">
  <button id="btn-en">English</button>
  <button id="btn-hr">Hrvatski</button>
  <button id="btn-me">Crnogorski</button>
  <button id="btn-es">Español</button>
  <button id="btn-de">Deutsch</button>
  <button id="btn-nl">Nederlands</button>
  <button id="btn-fr">Français</button>
</div>

<!-- ✅ YOUR IMAGE HERE (correct position) -->
<img src="images/favicon.png" id="bottomLogo">

</body>
</html>
