<script>
// Multilingual data (identique à ton code original)
const data = {
  en: {
    hint: "Enter the code with only the first letter capitalized. The answer are in english.",
    hints: { step: "🔍 Think about fruits and the ocean… each step has a clue!" },
    messages: {
      wrong: "❌ Wrong code, try again.",
      step1: "Step 1 unlocked!",
      step2: "Step 2 unlocked!",
      step3: "🏆 Congratulations! You finished the game!"
    },
    steps: {
      step1: { title: "📍 Step 1", coords: "48.8584, 2.2945", img: "images/step1-map.jpg" },
      step2: { title: "📍 Step 2", coords: "43.2965, 5.3698", img: "images/step2-map.jpg" },
      step3: { title: "🏁 Final Step", img: "https://via.placeholder.com/400x200" }
    }
  }
  // 👉 tu peux rajouter les autres langues ici comme avant
};

let currentLang = 'en';

/* ✅ Boutons de langue */
['en','hr','me','es','de','nl','fr'].forEach(lang => {
  const btn = document.getElementById('btn-'+lang);
  if(btn){
    btn.addEventListener('click', () => setLanguage(lang));
  }
});

/* ✅ Fonction langue */
function setLanguage(lang) {
  currentLang = lang;
  if(!data[lang]) return;

  document.getElementById('hint').innerText = data[lang].hint;

  ['step1','step2','step3'].forEach(step => {
    const elem = document.getElementById(step);
    if(elem.style.display === 'block') {
      document.getElementById(step+'Title').innerText = data[lang].steps[step].title;

      if(step !== 'step3') {
        document.getElementById(step+'Coords').innerText = data[lang].steps[step].coords;
        document.getElementById('mapImage'+step.charAt(4)).src = data[lang].steps[step].img;
      } else {
        document.getElementById('step3Congrats').innerText = data[lang].messages.step3;
      }
    }
  });
}

/* ✅ Codes */
document.getElementById('submitBtn').addEventListener('click', () => {
  const code = document.getElementById("codeInput").value.trim();
  const msg = document.getElementById("message");

  if (code === "Melon") {
    document.getElementById("step1").style.display = "block";
    msg.innerHTML = "<div class='success'>" + data[currentLang].messages.step1 + "</div>";
    setLanguage(currentLang);

  } else if (code === "Dorsal fin") {
    document.getElementById("step2").style.display = "block";
    msg.innerHTML = "<div class='success'>" + data[currentLang].messages.step2 + "</div>";
    setLanguage(currentLang);

  } else if (code === "Reef") {
    document.getElementById("step3").style.display = "block";
    document.getElementById("step3Congrats").innerText = data[currentLang].messages.step3;

  } else {
    msg.innerHTML = "<div class='error'>" + data[currentLang].messages.wrong + "</div>";
  }
});

/* ✅ Hint */
document.getElementById('hintBtn').addEventListener('click', () => {
  if(confirm("Are you sure you want to see the hint?")) {
    alert(data[currentLang].hints.step);
  }
});

/* ✅ Zoom cartes */
const pan1 = Panzoom(document.getElementById('mapImage1'), { maxScale: 3 });
const pan2 = Panzoom(document.getElementById('mapImage2'), { maxScale: 3 });

document.getElementById('mapContainer1').addEventListener('wheel', e => pan1.zoomWithWheel(e));
document.getElementById('mapContainer2').addEventListener('wheel', e => pan2.zoomWithWheel(e));
</script>
