<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { font-size: 1.8em; margin-bottom: 30px; }

.input-box {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

input {
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  width: 60%;
  max-width: 250px;
}

button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover { transform: scale(1.05); }

#hint { margin-top:10px; font-size:14px; color:#cbd5f5; }

.card {
  background: #1e293b;
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  display: none;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.success { color: #22c55e; margin-top: 15px; }
.error { color: #ef4444; margin-top: 15px; }

/* LANG BUTTONS */
.lang-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.lang-buttons button {
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;
}

#btn-en { background:#3b82f6; }
#btn-hr { background:#f97316; }
#btn-me { background:#10b981; }
#btn-es { background:#ef4444; }
#btn-de { background:#8b5cf6; }
#btn-nl { background:#f59e0b; }
#btn-fr { background:#6366f1; }

/* HINT BUTTONS */
.hint-buttons {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.hint-buttons button {
  background: #fbbf24;
}

</style>
</head>

<body>

<h1 id="title">🧭 Treasure Hunt</h1>

<div class="input-box">
  <input type="text" id="codeInput" placeholder="Enter your code">
  <button id="submitBtn">Submit</button>
</div>

<p id="hint"></p>
<div id="message"></div>

<!-- 3 HINT BUTTONS -->
<div class="hint-buttons">
  <button onclick="showHint(1)">Hint 1</button>
  <button onclick="showHint(2)">Hint 2</button>
  <button onclick="showHint(3)">Hint 3</button>
</div>

<!-- Steps -->
<div id="step1" class="card">
  <h2 id="step1Title">📍 Step 1</h2>
  <p id="step1Coords">48.8584, 2.2945</p>
  <img src="images/step1-map.jpg">
</div>

<div id="step2" class="card">
  <h2 id="step2Title">📍 Step 2</h2>
  <p id="step2Coords">43.2965, 5.3698</p>
  <img src="images/step2-map.jpg">
</div>

<div id="step3" class="card">
  <h2 id="step3Title">🏁 Final Step</h2>
  <div id="step3Congrats"></div>
  <img src="images/step3-map.jpg">
</div>

<!-- LANGUAGES FULL NAMES -->
<div class="lang-buttons">
  <button id="btn-en">English</button>
  <button id="btn-hr">Hrvatski</button>
  <button id="btn-me">Crnogorski</button>
  <button id="btn-es">Español</button>
  <button id="btn-de">Deutsch</button>
  <button id="btn-nl">Nederlands</button>
  <button id="btn-fr">Français</button>
</div>

<script>
const data = {
  en:{
    hint:"Enter the code with only the first letter capitalized. The answers are in English.",
    hints:{
      1:"🍈 It's a fruit with green flesh",
      2:"🦈 It's on a shark",
      3:"🌊 Coral ecosystem"
    },
    messages:{
      wrong:"❌ Wrong code",
      step1:"Step 1 unlocked!",
      step2:"Step 2 unlocked!",
      step3:"🏆 You finished!"
    }
  },
  fr:{
    hint:"Entrez le code avec seulement la première lettre en majuscule.",
    hints:{
      1:"🍈 C'est un fruit vert",
      2:"🦈 Partie d’un requin",
      3:"🌊 Écosystème marin"
    },
    messages:{
      wrong:"❌ Mauvais code",
      step1:"Étape 1 débloquée!",
      step2:"Étape 2 débloquée!",
      step3:"🏆 Terminé!"
    }
  },
  es:{
    hint:"Introduce el código con solo la primera letra en mayúscula.",
    hints:{
      1:"🍈 Fruta verde",
      2:"🦈 Parte del tiburón",
      3:"🌊 Ecosistema marino"
    },
    messages:{
      wrong:"❌ Código incorrecto",
      step1:"Paso 1 desbloqueado!",
      step2:"Paso 2 desbloqueado!",
      step3:"🏆 Terminado!"
    }
  }
};

let currentLang = "en";

// LANGUAGE SWITCH
document.querySelectorAll(".lang-buttons button").forEach(btn=>{
  btn.onclick = () => {
    currentLang = btn.id.split("-")[1];
    updateLang();
  };
});

function updateLang(){
  document.getElementById("hint").innerText = data[currentLang].hint;
}

// HINTS
function showHint(step){
  alert(data[currentLang].hints[step]);
}

// SUBMIT
document.getElementById("submitBtn").onclick = () => {
  const code = document.getElementById("codeInput").value.trim();
  const msg = document.getElementById("message");

  if(code === "Melon"){
    document.getElementById("step1").style.display = "block";
    msg.innerHTML = "<div class='success'>"+data[currentLang].messages.step1+"</div>";
  }
  else if(code === "Dorsal fin"){
    document.getElementById("step2").style.display = "block";
    msg.innerHTML = "<div class='success'>"+data[currentLang].messages.step2+"</div>";
  }
  else if(code === "Reef"){
    document.getElementById("step3").style.display = "block";
    document.getElementById("step3Congrats").innerText = data[currentLang].messages.step3;
  }
  else{
    msg.innerHTML = "<div class='error'>"+data[currentLang].messages.wrong+"</div>";
  }
};

// INIT
updateLang();
</script>

</body>
</html>
