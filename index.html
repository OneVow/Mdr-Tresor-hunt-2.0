<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { font-size: 1.8em; margin-bottom: 30px; }

.input-box {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

input {
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  width: 60%;
  max-width: 250px;
}

button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover { transform: scale(1.05); }

#hint { margin-top:10px; font-size:14px; color:#cbd5f5; }

.card {
  background: #1e293b;
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  display: none;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

/* 🔥 AJOUT ZOOM SANS CASSER */
.map-container {
  overflow: hidden;
  border-radius: 10px;
  touch-action: none;
}

.success { color: #22c55e; margin-top: 15px; }
.error { color: #ef4444; margin-top: 15px; }

.lang-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.lang-buttons button {
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;
}

#btn-en { background:#3b82f6; }
#btn-hr { background:#f97316; }
#btn-me { background:#10b981; }
#btn-es { background:#ef4444; }
#btn-de { background:#8b5cf6; }
#btn-nl { background:#f59e0b; }
#btn-fr { background:#6366f1; }

.hint-buttons {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.hint-buttons button {
  background: #fbbf24;
}
</style>
</head>

<body>

<h1>🧭 Treasure Hunt</h1>

<div class="input-box">
  <input type="text" id="codeInput" placeholder="Enter your code">
  <button id="submitBtn">Submit</button>
</div>

<p id="hint"></p>
<div id="message"></div>

<div class="hint-buttons">
  <button onclick="showHint(1)">Hint 1</button>
  <button onclick="showHint(2)">Hint 2</button>
  <button onclick="showHint(3)">Hint 3</button>
</div>

<!-- STEP 1 -->
<div id="step1" class="card">
  <h2 id="step1Title">📍 Step 1</h2>
  <p id="step1Coords">48.8584, 2.2945</p>

  <!-- 🔥 JUSTE WRAP IMAGE -->
  <div class="map-container" id="mapContainer1">
    <img id="mapImage1" src="images/step1-map.jpg">
  </div>
</div>

<!-- STEP 2 -->
<div id="step2" class="card">
  <h2 id="step2Title">📍 Step 2</h2>
  <p id="step2Coords">43.2965, 5.3698</p>

  <div class="map-container" id="mapContainer2">
    <img id="mapImage2" src="images/step2-map.jpg">
  </div>
</div>

<!-- STEP 3 -->
<div id="step3" class="card">
  <h2 id="step3Title">🏁 Final Step</h2>
  <div id="step3Congrats"></div>
  <img src="images/step3-map.jpg">
</div>

<div class="lang-buttons">
  <button id="btn-en">English</button>
  <button id="btn-hr">Hrvatski</button>
  <button id="btn-me">Crnogorski</button>
  <button id="btn-es">Español</button>
  <button id="btn-de">Deutsch</button>
  <button id="btn-nl">Nederlands</button>
  <button id="btn-fr">Français</button>
</div>

<!-- PANZOOM -->
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

<script>
// 🔥 ZOOM (AJOUT SANS TOUCHER LE RESTE)
const img1 = document.getElementById('mapImage1');
const img2 = document.getElementById('mapImage2');

if(img1){
  const pan1 = Panzoom(img1, { maxScale: 4 });
  document.getElementById('mapContainer1').addEventListener('wheel', pan1.zoomWithWheel);
}

if(img2){
  const pan2 = Panzoom(img2, { maxScale: 4 });
  document.getElementById('mapContainer2').addEventListener('wheel', pan2.zoomWithWheel);
}

// 🔽 TON CODE ORIGINAL (INCHANGÉ)
const data = {
  en:{hint:"Enter the code with only the first letter capitalized. The answer must be written in English.",hints:{1:"🍈 Green fruit",2:"🦈 Shark part",3:"🌊 Coral ecosystem"},messages:{wrong:"❌ Wrong code",step1:"Step 1 unlocked!",step2:"Step 2 unlocked!",step3:"🏆 Finished!"}},
  fr:{hint:"Entrez le code avec seulement la première lettre en majuscule. La réponse doit être écrite en anglais.",hints:{1:"🍈 Fruit vert",2:"🦈 Partie du requin",3:"🌊 Écosystème marin"},messages:{wrong:"❌ Mauvais code",step1:"Étape 1 débloquée!",step2:"Étape 2 débloquée!",step3:"🏆 Terminé!"}},
  es:{hint:"Introduce el código con solo la primera letra en mayúscula. La respuesta debe estar en inglés.",hints:{1:"🍈 Fruta verde",2:"🦈 Parte del tiburón",3:"🌊 Ecosistema marino"},messages:{wrong:"❌ Código incorrecto",step1:"Paso 1 desbloqueado!",step2:"Paso 2 desbloqueado!",step3:"🏆 Terminado!"}},
  hr:{hint:"Unesite kod s velikim početnim slovom. Odgovor mora biti napisan na engleskom.",hints:{1:"🍈 Zeleno voće",2:"🦈 Dio morskog psa",3:"🌊 Morski ekosustav"},messages:{wrong:"❌ Pogrešan kod",step1:"Korak 1 otključan!",step2:"Korak 2 otključan!",step3:"🏆 Gotovo!"}},
  me:{hint:"Unesite kod sa velikim početnim slovom. Odgovor mora biti napisan na engleskom.",hints:{1:"🍈 Zeleno voće",2:"🦈 Dio ajkule",3:"🌊 Morski ekosistem"},messages:{wrong:"❌ Pogrešan kod",step1:"Korak 1 otključan!",step2:"Korak 2 otključan!",step3:"🏆 Gotovo!"}},
  de:{hint:"Geben Sie den Code mit großem Anfangsbuchstaben ein. Die Antwort muss auf Englisch geschrieben sein.",hints:{1:"🍈 Grünes Obst",2:"🦈 Teil eines Hais",3:"🌊 Meeresökosystem"},messages:{wrong:"❌ Falscher Code",step1:"Schritt 1 freigeschaltet!",step2:"Schritt 2 freigeschaltet!",step3:"🏆 Fertig!"}},
  nl:{hint:"Voer de code in met een hoofdletter. Het antwoord moet in het Engels geschreven zijn.",hints:{1:"🍈 Groen fruit",2:"🦈 Deel van een haai",3:"🌊 Zee-ecosysteem"},messages:{wrong:"❌ Verkeerde code",step1:"Stap 1 ontgrendeld!",step2:"Stap 2 ontgrendeld!",step3:"🏆 Klaar!"}}
};

let currentLang = "en";

document.querySelectorAll(".lang-buttons button").forEach(btn=>{
  btn.onclick = () => {
    currentLang = btn.id.split("-")[1];
    updateLang();
  };
});

function updateLang(){
  document.getElementById("hint").innerText = data[currentLang].hint;
}

function showHint(step){
  alert(data[currentLang].hints[step]);
}

document.getElementById("submitBtn").onclick = () => {
  const code = document.getElementById("codeInput").value.trim();
  const msg = document.getElementById("message");

  if(code === "Melon"){
    document.getElementById("step1").style.display = "block";
    msg.innerHTML = "<div class='success'>"+data[currentLang].messages.step1+"</div>";
  }
  else if(code === "Dorsal fin"){
    document.getElementById("step2").style.display = "block";
    msg.innerHTML = "<div class='success'>"+data[currentLang].messages.step2+"</div>";
  }
  else if(code === "Reef"){
    document.getElementById("step3").style.display = "block";
    document.getElementById("step3Congrats").innerText = data[currentLang].messages.step3;
  }
  else{
    msg.innerHTML = "<div class='error'>"+data[currentLang].messages.wrong+"</div>";
  }
};

updateLang();
</script>

</body>
</html>
