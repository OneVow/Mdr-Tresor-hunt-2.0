<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt</title>

<link rel="icon" type="image/png" href="images/favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

#bgLogo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 220px;
  opacity: 0.08;
  z-index: 0;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 1;
}

h1 { font-size: 1.8em; margin-bottom: 30px; }

.input-box {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

input {
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  width: 60%;
  max-width: 250px;
}

button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover { transform: scale(1.05); }

#hint { margin-top:10px; font-size:14px; color:#cbd5f5; }

.card {
  background: #1e293b;
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  display: none;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.success { color: #22c55e; margin-top: 15px; }
.error { color: #ef4444; margin-top: 15px; }

.lang-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.lang-buttons button {
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;
}

#btn-en { background:#3b82f6; }
#btn-hr { background:#f97316; }
#btn-me { background:#10b981; }
#btn-es { background:#ef4444; }
#btn-de { background:#8b5cf6; }
#btn-nl { background:#f59e0b; }
#btn-fr { background:#6366f1; }

.hint-buttons {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.hint-buttons button {
  background: #fbbf24;
}

/* AJOUT PHOTOS AUTOUR */
.final-container {
  position: relative;
  width: 260px;
  margin: 20px auto;
}

.final-container .main {
  width: 100%;
  border-radius: 15px;
}

.final-container .side {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
}

.top-left { top: -30px; left: -30px; }
.top-right { top: -30px; right: -30px; }
.middle-left { top: 50%; left: -40px; transform: translateY(-50%); }
.middle-right { top: 50%; right: -40px; transform: translateY(-50%); }
.bottom-left { bottom: -30px; left: -30px; }
.bottom-right { bottom: -30px; right: -30px; }

</style>
</head>

<body>

<img src="images/favicon.png" id="bgLogo">

<div class="content">

<h1 id="title">🧭 Treasure Hunt</h1>

<div class="input-box">
  <input type="text" id="codeInput" placeholder="Enter your code">
  <button id="submitBtn">Submit</button>
</div>

<p id="hint"></p>
<div id="message"></div>

<div id="revealHintBox" style="display:none; margin-top:15px;">
  <button onclick="revealHint()">🔍 Reveal next location</button>
  <p id="locationInfo" style="font-size:12px; color:#cbd5f5;"></p>
  <p id="revealedHint" style="margin-top:10px; color:#fbbf24;"></p>
</div>

<div class="hint-buttons">
  <button id="hintBtn1" onclick="showHint(1)"></button>
  <button id="hintBtn2" onclick="showHint(2)"></button>
  <button id="hintBtn3" onclick="showHint(3)"></button>
</div>

<div id="step1" class="card">
  <h2 id="step1Title">📍 Step 1</h2>
  <p id="step1Coords">48.8584, 2.2945</p>
  <img id="mapImage1" src="images/step1-map.jpg">
</div>

<div id="step2" class="card">
  <h2 id="step2Title">📍 Step 2</h2>
  <p id="step2Coords">43.2965, 5.3698</p>
  <img id="mapImage2" src="images/step2-map.jpg">
</div>

<div id="step3" class="card">
  <h2 id="step3Title">🏁 Final Step</h2>
  <div id="step3Congrats"></div>

  <div class="final-container">
    <img src="images/final.gif" class="main">
    <img src="images/photo1.jpg" class="side top-left">
    <img src="images/photo2.jpg" class="side top-right">
    <img src="images/photo3.jpg" class="side middle-left">
    <img src="images/photo4.jpg" class="side middle-right">
    <img src="images/photo5.jpg" class="side bottom-left">
    <img src="images/photo6.jpg" class="side bottom-right">
  </div>

</div>

<div class="lang-buttons">
  <button id="btn-en">English</button>
  <button id="btn-hr">Hrvatski</button>
  <button id="btn-me">Crnogorski</button>
  <button id="btn-es">Español</button>
  <button id="btn-de">Deutsch</button>
  <button id="btn-nl">Nederlands</button>
  <button id="btn-fr">Français</button>
</div>

</div>

<footer style="margin-top:40px; font-size:12px; color:#94a3b8;">
  <p id="footerText"></p>
  <p>
    © 2023 DMAD - Marine Mammals Research Association |
    <a href="https://montenegrodolphinresearch.org" target="_blank" style="color:#60a5fa;">
      Montenegro Dolphin Research
    </a>
  </p>
</footer>

<script>

/* 🎉 CONFETTI */
function launchConfetti(){
  for(let i=0;i<80;i++){
    let confetti = document.createElement("div");
    confetti.style.position = "fixed";
    confetti.style.width = "6px";
    confetti.style.height = "6px";
    confetti.style.backgroundColor = "hsl(" + Math.random()*360 + ",100%,50%)";
    confetti.style.top = "-10px";
    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.zIndex = "9999";

    document.body.appendChild(confetti);

    let duration = Math.random()*3 + 2;

    confetti.animate([
      { transform: "translateY(0px)" },
      { transform: "translateY(100vh)" }
    ],{
      duration: duration*1000,
      easing: "linear"
    });

    setTimeout(()=> confetti.remove(), duration*1000);
  }
}

/* TON SCRIPT ORIGINAL (INCHANGÉ) */

const data = {
  en:{
    hint:"Enter the code with only the first letter capitalized. The answer must be written in English. The word must be written in full. The second code contains two words.",
    hintLabels:{1:"Hint for riddle 1",2:"Hint for riddle 2",3:"Hint for riddle 3"},
    locationInfo:"⬆️ Use this hint if you are having trouble finding the next cache.",
    footer:"This treasure hunt is part of the activities of Montenegro Dolphin Research.",
    hints:{1:"🍈 It's a fruit with green flesh",2:"🦈 It's on a shark",3:"🌊 Coral ecosystem"},
    locationHints:{1:"📦 The next cache is under a flat rock near a big tree",2:"📦 Look inside something metallic near water",3:"🏁 The treasure is under a wooden bench"},
    messages:{wrong:"❌ Wrong code",step1:"Step 1 unlocked!",step2:"Step 2 unlocked!",step3:"🏆 You finished!"}
  },

  fr:{
    hint:"Entrez le code avec seulement la première lettre en majuscule. La réponse doit être écrite en anglais. Le mot doit être écrit en entier. Le deuxième code contient deux mots.",
    hintLabels:{1:"Indice pour énigme 1",2:"Indice pour énigme 2",3:"Indice pour énigme 3"},
    locationInfo:"⬆️Utilisez cet indice si vous avez des difficultés à trouver la prochaine cache.",
    footer:"Cette chasse au trésor fait partie des activités de Montenegro Dolphin Research.",
    hints:{1:"🍈 C'est un fruit vert",2:"🦈 Partie d’un requin",3:"🌊 Écosystème marin"},
    locationHints:{1:"📦 La prochaine cache est sous une pierre plate près d’un grand arbre",2:"📦 Cherchez dans quelque chose de métallique près de l’eau",3:"🏁 Le trésor est sous un banc en bois"},
    messages:{wrong:"❌ Mauvais code",step1:"Étape 1 débloquée!",step2:"Étape 2 débloquée!",step3:"🏆 Terminé!"}
  },

  es:{
    hint:"Introduce el código con solo la primera letra en mayúscula. La respuesta debe estar en inglés. La palabra debe escribirse completa. El segundo código contiene dos palabras.",
    hintLabels:{1:"Pista para acertijo 1",2:"Pista para acertijo 2",3:"Pista para acertijo 3"},
    locationInfo:"⬆️Usa esta pista si tienes dificultades para encontrar la siguiente cache.",
    footer:"Esta búsqueda del tesoro forma parte de las actividades de Montenegro Dolphin Research.",
    hints:{1:"🍈 Fruta verde",2:"🦈 Parte del tiburón",3:"🌊 Ecosistema marino"},
    locationHints:{1:"📦 La próxima pista está bajo una piedra plana cerca de un árbol",2:"📦 Busca dentro de algo metálico cerca del agua",3:"🏁 El tesoro está bajo un banco de madera"},
    messages:{wrong:"❌ Código incorrecto",step1:"Paso 1 desbloqueado!",step2:"Paso 2 desbloqueado!",step3:"🏆 Terminado!"}
  },

  hr:{
    hint:"Unesite kod s samo prvim velikim slovom. Odgovor mora biti napisan na engleskom. Riječ mora biti napisana u cijelosti. Drugi kod ima dvije riječi.",
    hintLabels:{1:"Savjet za zagonetku 1",2:"Savjet za zagonetku 2",3:"Savjet za zagonetku 3"},
    locationInfo:"⬆️Koristite ovaj savjet ako imate poteškoća pronaći sljedeću lokaciju.",
    footer:"Ova potraga za blagom dio je aktivnosti Montenegro Dolphin Research.",
    hints:{1:"🍈 Zeleno voće",2:"🦈 Dio morskog psa",3:"🌊 Morski ekosistem"},
    locationHints:{1:"📦 Sljedeća lokacija je ispod ravnog kamena blizu velikog stabla",2:"📦 Pogledajte u nešto metalno blizu vode",3:"🏁 Blago je ispod drvene klupe"},
    messages:{wrong:"❌ Pogrešan kod",step1:"Korak 1 otključan!",step2:"Korak 2 otključan!",step3:"🏆 Završeno!"}
  },

  me:{
    hint:"Unesite kod samo s prvim velikim slovom. Odgovor mora biti na engleskom. Riječ mora biti napisana u cjelosti. Drugi kod ima dvije riječi.",
    hintLabels:{1:"Savjet za zagonetku 1",2:"Savjet za zagonetku 2",3:"Savjet za zagonetku 3"},
    locationInfo:"⬆️Koristite ovaj savjet ako imate poteškoća da pronađete sljedeću lokaciju.",
    footer:"Ova potraga za blagom dio je aktivnosti Montenegro Dolphin Research.",
    hints:{1:"🍈 Zeleno voće",2:"🦈 Dio ajkule",3:"🌊 Morski ekosistem"},
    locationHints:{1:"📦 Sljedeća lokacija je ispod ravnog kamena blizu velikog drveta",2:"📦 Pogledajte u nešto metalno blizu vode",3:"🏁 Blago je ispod drvene klupe"},
    messages:{wrong:"❌ Pogrešan kod",step1:"Korak 1 otključan!",step2:"Korak 2 otključan!",step3:"🏆 Završeno!"}
  },

  de:{
    hint:"Geben Sie den Code mit nur dem ersten Großbuchstaben ein. Die Antwort muss auf Englisch sein. Das Wort muss vollständig geschrieben werden. Der zweite Code besteht aus zwei Wörtern.",
    hintLabels:{1:"Hinweis für Rätsel 1",2:"Hinweis für Rätsel 2",3:"Hinweis für Rätsel 3"},
    locationInfo:"⬆️Verwenden Sie diesen Hinweis, wenn Sie Schwierigkeiten haben, das nächste Versteck zu finden.",
    footer:"Diese Schatzsuche ist Teil der Aktivitäten von Montenegro Dolphin Research.",
    hints:{1:"🍈 Grünes Obst",2:"🦈 Teil eines Hais",3:"🌊 Meeresökosystem"},
    locationHints:{1:"📦 Der nächste Hinweis liegt unter einem flachen Stein neben einem großen Baum",2:"📦 Schau in etwas Metallisches nahe am Wasser",3:"🏁 Der Schatz liegt unter einer Holzbank"},
    messages:{wrong:"❌ Falscher Code",step1:"Schritt 1 freigeschaltet!",step2:"Schritt 2 freigeschaltet!",step3:"🏆 Fertig!"}
  },

  nl:{
    hint:"Voer de code in met alleen de eerste letter als hoofdletter. Het antwoord moet in het Engels zijn. Het woord moet volledig geschreven worden. De tweede code bestaat uit twee woorden.",
    hintLabels:{1:"Hint voor raadsel 1",2:"Hint voor raadsel 2",3:"Hint voor raadsel 3"},
    locationInfo:"⬆️Gebruik deze hint als je moeite hebt om de volgende locatie te vinden.",
    footer:"Deze schattenjacht maakt deel uit van de activiteiten van Montenegro Dolphin Research.",
    hints:{1:"🍈 Groene vrucht",2:"🦈 Onderdeel van een haai",3:"🌊 Zee-ecosysteem"},
    locationHints:{1:"📦 De volgende locatie is onder een platte steen bij een grote boom",2:"📦 Kijk in iets van metaal bij water",3:"🏁 De schat ligt onder een houten bank"},
    messages:{wrong:"❌ Verkeerde code",step1:"Stap 1 ontgrendeld!",step2:"Stap 2 ontgrendeld!",step3:"🏆 Klaar!"}
  }
};

let currentLang = "en";
let currentStep = 0;

document.querySelectorAll(".lang-buttons button").forEach(btn=>{
  btn.onclick = () => {
    const lang = btn.id.replace("btn-","");
    if(data[lang]){
      currentLang = lang;
      updateLang();
    }
  };
});

function updateLang(){
  document.getElementById("hint").innerText = data[currentLang].hint;
  document.getElementById("hintBtn1").innerText = data[currentLang].hintLabels[1];
  document.getElementById("hintBtn2").innerText = data[currentLang].hintLabels[2];
  document.getElementById("hintBtn3").innerText = data[currentLang].hintLabels[3];
  document.getElementById("locationInfo").innerText = data[currentLang].locationInfo;
  document.getElementById("footerText").innerText = data[currentLang].footer;
}

function showHint(step){
  alert(data[currentLang].hints[step]);
}

function revealHint(){
  if(currentStep > 0){
    document.getElementById("revealedHint").innerText =
      data[currentLang].locationHints[currentStep];
  }
}

document.getElementById("submitBtn").onclick = () => {
  const code = document.getElementById("codeInput").value.trim();
  const msg = document.getElementById("message");

  document.getElementById("revealHintBox").style.display = "none";
  document.getElementById("revealedHint").innerText = "";

  if(code === "Melon"){
    currentStep = 1;
    document.getElementById("step1").style.display = "block";
    document.getElementById("revealHintBox").style.display = "block";
    msg.innerHTML = "<div class='success'>"+data[currentLang].messages.step1+"</div>";
  }
  else if(code === "Dorsal fin"){
    currentStep = 2;
    document.getElementById("step2").style.display = "block";
    document.getElementById("revealHintBox").style.display = "block";
    msg.innerHTML = "<div class='success'>"+data[currentLang].messages.step2+"</div>";
  }
  else if(code === "Reef"){
    launchConfetti();
    currentStep = 3;
    document.getElementById("step3").style.display = "block";
    document.getElementById("step3Congrats").innerText = data[currentLang].messages.step3;
  }
  else{
    msg.innerHTML = "<div class='error'>"+data[currentLang].messages.wrong+"</div>";
  }
};

updateLang();
</script>

</body>
</html>
